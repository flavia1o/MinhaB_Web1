<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>minha estante</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
 <h1>minha estante de livros</h1>
 <p>todos os meus livros favoritos</p>
</header>

<div class="busca-wrap">
 <input type="text" id="busca" placeholder="buscar livro pelo título...">
</div>

<div class="stats">
 <div class="stat"><span class="num" id="stat-total">0</span><span class="lbl">total</span></div>
 <div class="stat"><span class="num" id="stat-rep">0</span><span class="lbl">repetidos</span></div>
 <div class="stat"><span class="num" id="stat-unicos">0</span><span class="lbl">únicos</span></div>
 <div class="stat"><span class="num" id="stat-troca">0</span><span class="lbl">p/ troca</span></div>
 <div class="stat"><span class="num" id="stat-favs">0</span><span class="lbl">favoritos</span></div>
</div>

<div class="container">

 <div class="form-box">
  <h2>adicionar livro</h2>

  <label for="inp-titulo">título</label>
  <input type="text" id="inp-titulo" placeholder="nome do livro">

  <label for="inp-autor">autor(a)</label>
  <input type="text" id="inp-autor" placeholder="quem escreveu">

  <label for="inp-genero">gênero</label>
  <select id="inp-genero">
   <option value="fantasia">fantasia</option>
   <option value="romance">romance</option>
   <option value="ficcao">ficção científica</option>
   <option value="terror">terror</option>
   <option value="aventura">aventura</option>
   <option value="historia">história</option>
   <option value="autoajuda">autoajuda</option>
   <option value="poesia">poesia</option>
  </select>

  <label for="inp-raridade">raridade</label>
  <select id="inp-raridade">
   <option value="1">comum</option>
   <option value="2">incomum</option>
   <option value="3">raro</option>
   <option value="4">muito raro</option>
   <option value="5">lendário</option>
  </select>

  <label for="inp-capa">url da capa (opcional)</label>
  <input type="text" id="inp-capa" placeholder="https://...">

  <label class="check-row">
   <input type="checkbox" id="inp-rep">
   tenho repetido
  </label>

  <button class="btn-add" id="btn-add">+ adicionar</button>
 </div>

 <div class="grid-wrap">
  <div class="empty" id="empty">
   <span>:)</span>
   sua estante tá vazia ainda...<br>
   adiciona o primeiro livro!
  </div>

  <div class="grid" id="grid" style="display:none"></div>
 </div>

</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>

</body>
</html>
